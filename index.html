<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }

  /* ── top bar ── */
  header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 20px;
           display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 600; }

  /* ── layout ── */
  main { max-width: 700px; margin: 0 auto; padding: 16px 16px 80px; }

  /* ── tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 7px 16px; border-radius: 8px; font-size: 14px; border: 1px solid #e5e5e5;
         cursor: pointer; background: #fff; }
  .tab.active { background: #222; color: #fff; border-color: #222; }

  /* ── goals list ── */
  .goal-item { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .goal-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .badge.work { background: #eeedfe; color: #534ab7; }
  .badge.life { background: #e1f5ee; color: #0f6e56; }
  .goal-title { font-weight: 600; font-size: 15px; flex: 1; }
  .goal-meta { font-size: 12px; color: #888; margin-bottom: 8px; }

  /* progress bar */
  .progress-wrap { background: #f0f0f0; border-radius: 4px; height: 6px; margin-bottom: 4px; }
  .progress-bar { height: 6px; border-radius: 4px; background: #534ab7; transition: width .3s; }
  .progress-bar.life { background: #1d9e75; }
  .progress-label { font-size: 12px; color: #888; }

  /* ── collapsible goal ── */
  .goal-summary { cursor: pointer; user-select: none; }
  .goal-summary:hover .goal-title { text-decoration: underline; text-decoration-color: #ccc; }
  .goal-chevron { font-size: 11px; color: #bbb; margin-left: 4px; transition: transform .2s; display: inline-block; }
  .goal-item.open .goal-chevron { transform: rotate(90deg); }
  .goal-detail { display: none; margin-top: 12px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
  .goal-item.open .goal-detail { display: block; }

  /* goal action buttons */
  .goal-actions { display: flex; gap: 6px; margin-top: 10px; }
  .btn-icon { padding: 5px 10px; font-size: 12px; border-radius: 6px; border: 1px solid #e5e5e5;
              background: #fff; cursor: pointer; color: #666; }
  .btn-icon:hover { background: #f5f5f5; }
  .btn-icon.danger { color: #a32d2d; border-color: #f5c6c6; }
  .btn-icon.danger:hover { background: #fff0f0; }

  /* milestones */
  .ms-item { display: flex; align-items: center; gap: 8px; padding: 7px 0;
             border-bottom: 1px solid #f8f8f8; font-size: 14px; }
  .ms-item:last-child { border-bottom: none; }
  .ms-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: #534ab7; }
  .ms-title { flex: 1; }
  .ms-title.done { text-decoration: line-through; color: #aaa; }
  .ms-date { font-size: 11px; color: #aaa; }
  .ms-btn { padding: 3px 8px; font-size: 11px; border-radius: 5px; border: 1px solid #e5e5e5;
            background: #fff; cursor: pointer; color: #666; flex-shrink: 0; }
  .ms-btn:hover { background: #f5f5f5; }
  .ms-btn.danger { color: #a32d2d; border-color: #f5c6c6; }
  .ms-btn.danger:hover { background: #fff0f0; }

  /* inline add/edit milestone */
  .ms-add { display: flex; gap: 8px; margin-top: 10px; }
  .ms-add input { flex: 1; padding: 7px 10px; font-size: 13px; }
  .ms-add button { padding: 7px 14px; font-size: 13px; flex-shrink: 0; }

  /* ── button base ── */
  button {
    padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1px solid #ddd; background: #fff; transition: all .15s; }
  button:hover { background: #f5f5f5; }
  button.primary { background: #222; color: #fff; border-color: #222; }
  button.primary:hover { background: #444; }
  button.small { padding: 6px 12px; font-size: 13px; }
  button:disabled { opacity: .45; cursor: not-allowed; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 28px; right: 24px; z-index: 20;
    width: 52px; height: 52px; border-radius: 50%;
    background: #222; color: #fff; border: none;
    font-size: 26px; line-height: 1; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,.25); cursor: pointer;
    transition: background .15s, transform .15s; padding: 0; }
  .fab:hover { background: #444; transform: scale(1.07); }

  /* ── modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s; }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: #fff; border-radius: 14px; padding: 24px;
    width: 100%; max-width: 480px;
    transform: translateY(20px); transition: transform .2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-close {
    background: none; border: none; font-size: 18px; color: #999;
    cursor: pointer; padding: 4px 8px; line-height: 1; }
  .modal-close:hover { color: #333; background: #f0f0f0; border-radius: 6px; }

  /* ── forms (inside modal) ── */
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 13px; color: #555; font-weight: 500; }
  input, select, textarea {
    padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; font-family: inherit; width: 100%;
    transition: border-color .15s; background: #fafafa; }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #666; background: #fff; }
  textarea { resize: vertical; min-height: 70px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  /* ── toast ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
           background: #222; color: #fff; padding: 10px 20px; border-radius: 8px;
           font-size: 14px; transition: transform .25s; z-index: 100; pointer-events: none; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.err   { background: #a32d2d; }

  /* ── confirm dialog ── */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 60; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s; }
  .confirm-overlay.open { opacity: 1; pointer-events: auto; }
  .confirm-box {
    background: #fff; border-radius: 14px; padding: 24px;
    width: 100%; max-width: 360px; text-align: center;
    transform: translateY(20px); transition: transform .2s; }
  .confirm-overlay.open .confirm-box { transform: translateY(0); }
  .confirm-box p { font-size: 15px; margin-bottom: 18px; line-height: 1.5; }
  .confirm-box .btn-row { justify-content: center; }

  /* ── empty state ── */
  .empty { text-align: center; color: #bbb; padding: 32px 0; font-size: 14px; }

  /* ── loading spinner ── */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd;
             border-top-color: #666; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>🎯 Goal Tracker</h1>
</header>

<main>
  <!-- 分類 tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setTab('all', this)">全部</button>
    <button class="tab" onclick="setTab('work', this)">💼 工作</button>
    <button class="tab" onclick="setTab('life', this)">🌿 生活</button>
  </div>

  <!-- 目標列表 -->
  <div id="goals-list"><div class="empty">載入中… <span class="spinner"></span></div></div>
</main>

<!-- 右下角新增按鈕 -->
<button class="fab" onclick="openGoalModal()" title="新增目標">＋</button>

<!-- 新增 / 編輯目標 Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">➕ 新增目標</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-row">
      <label>目標名稱 *</label>
      <input id="g-title" type="text" placeholder="例：完成 Q3 產品上線">
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label>類別</label>
        <select id="g-category">
          <option value="work">💼 工作</option>
          <option value="life">🌿 生活</option>
        </select>
      </div>
      <div class="form-row" style="margin:0">
        <label>截止日</label>
        <input id="g-date" type="date">
      </div>
    </div>
    <div class="form-row">
      <label>說明（選填）</label>
      <textarea id="g-desc" placeholder="目標背景或細節…"></textarea>
    </div>
    <div class="btn-row">
      <button class="primary" id="save-btn" onclick="saveGoal()">新增目標</button>
      <button onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<!-- 編輯里程碑 Modal -->
<div class="modal-overlay" id="ms-modal-overlay" onclick="closeMsModalOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>✏️ 編輯里程碑</h2>
      <button class="modal-close" onclick="closeMsModal()">✕</button>
    </div>
    <div class="form-row">
      <label>里程碑名稱 *</label>
      <input id="ms-edit-title" type="text" placeholder="里程碑名稱">
    </div>
    <div class="btn-row">
      <button class="primary" id="ms-save-btn" onclick="saveMilestone()">儲存</button>
      <button onclick="closeMsModal()">取消</button>
    </div>
  </div>
</div>

<!-- 確認刪除對話框 -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-msg">確定要刪除嗎？</p>
    <div class="btn-row">
      <button class="primary" style="background:#a32d2d;border-color:#a32d2d" id="confirm-ok">確認刪除</button>
      <button onclick="closeConfirm()">取消</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 設定 ──────────────────────────────────────────────────
const API_URL   = "https://script.google.com/macros/s/AKfycbwq9Q7f4XFF0LmsdTgx65eM4V32jAic4ReAIn-CVBmwMEUW4gRXDi1jB1uXovQ-2AgYZA/exec";
const API_TOKEN = "goaltracker2026";
const LS_KEY    = "goaltracker_data";

// ── state ──────────────────────────────────────────────────
let allGoals      = [];
let activeTab     = "all";
let editingGoalId = null;   // null = 新增, 否則為編輯中的 goal_id
let editingMsId   = null;   // 編輯中的 milestone_id
let editingMsGoalId = null; // 編輯里程碑所屬的 goal_id
const expandedGoals = new Set();

// ── init ───────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  loadGoals();
});

// ── localStorage helpers ───────────────────────────────────
function lsLoad() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || null; } catch { return null; }
}
function lsSave(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}
function genId(prefix) {
  return prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
}

// ── API call（只用於初次載入） ──────────────────────────────
async function fetchFromApi() {
  const url = new URL(API_URL);
  url.searchParams.set("token", API_TOKEN);
  url.searchParams.set("action", "getGoals");
  const res  = await fetch(url.toString());
  const data = await res.json();
  if (!data.success) throw new Error(data.error || "API error");
  return data.data;
}

// ── load goals ─────────────────────────────────────────────
async function loadGoals() {
  const cached = lsLoad();
  if (cached) {
    allGoals = cached;
    renderGoals();
    return;
  }
  // 首次載入：嘗試從 API 同步資料
  try {
    const data = await fetchFromApi();
    allGoals = data;
    lsSave(allGoals);
    renderGoals();
  } catch (e) {
    // API 不可用時，從空白開始
    allGoals = [];
    lsSave(allGoals);
    renderGoals();
    toast("無法連線 API，以本機模式運作", true);
  }
}

// ── render goals ───────────────────────────────────────────
function setTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  renderGoals();
}

function toggleGoal(goalId) {
  const el = document.getElementById("goal-" + goalId);
  if (!el) return;
  if (expandedGoals.has(goalId)) {
    expandedGoals.delete(goalId);
    el.classList.remove("open");
  } else {
    expandedGoals.add(goalId);
    el.classList.add("open");
  }
}

function renderGoals() {
  const list = document.getElementById("goals-list");
  let goals  = allGoals.filter(g => g.status !== "done" && g.status !== "archived");
  if (activeTab !== "all") goals = goals.filter(g => g.category === activeTab);
  if (!goals.length) { list.innerHTML = '<div class="empty">目前沒有進行中的目標</div>'; return; }

  list.innerHTML = goals.map(g => {
    const total  = (g.milestones || []).length;
    const done   = (g.milestones || []).filter(m => m.status === "done").length;
    const pct    = total ? Math.round(done / total * 100) : 0;
    const isLife = g.category === "life";
    const isOpen = expandedGoals.has(g.goal_id);

    const msHtml = (g.milestones || []).map(m => `
      <div class="ms-item">
        <input type="checkbox" ${m.status==="done"?"checked":""} onchange="toggleMs('${g.goal_id}','${m.milestone_id}', this)">
        <span class="ms-title ${m.status==="done"?"done":""}">${esc(m.title)}</span>
        ${m.completed_at ? `<span class="ms-date">${String(m.completed_at).slice(5,10)}</span>` : ""}
        <button class="ms-btn" onclick="openMsEditModal('${g.goal_id}','${m.milestone_id}')">編輯</button>
        <button class="ms-btn danger" onclick="confirmDeleteMs('${g.goal_id}','${m.milestone_id}')">刪除</button>
      </div>`).join("");

    return `
    <div class="goal-item${isOpen?" open":""}" id="goal-${g.goal_id}">
      <div class="goal-summary" onclick="toggleGoal('${g.goal_id}')">
        <div class="goal-header">
          <span class="badge ${g.category}">${isLife?"🌿 生活":"💼 工作"}</span>
          <span class="goal-title">${esc(g.title)}</span>
          <span class="goal-chevron">▶</span>
        </div>
        <div class="goal-meta">${g.target_date ? "截止 " + g.target_date : "無截止日"} · ${done}/${total} 里程碑</div>
        <div class="progress-wrap"><div class="progress-bar ${isLife?"life":""}" style="width:${pct}%"></div></div>
        <div class="progress-label">${pct}%</div>
      </div>
      <div class="goal-detail">
        ${msHtml}
        <div class="ms-add">
          <input type="text" placeholder="新增里程碑…" id="ms-input-${g.goal_id}" onkeydown="if(event.key==='Enter')addMs('${g.goal_id}')">
          <button class="small primary" onclick="addMs('${g.goal_id}')">+新增</button>
        </div>
        <div class="goal-actions">
          <button class="btn-icon" onclick="openGoalEditModal('${g.goal_id}')">✏️ 編輯目標</button>
          <button class="btn-icon danger" onclick="confirmDeleteGoal('${g.goal_id}')">🗑️ 刪除目標</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── 目標 Modal (新增 / 編輯) ────────────────────────────────
function openGoalModal() {
  editingGoalId = null;
  document.getElementById("modal-title").textContent = "➕ 新增目標";
  document.getElementById("save-btn").textContent = "新增目標";
  document.getElementById("g-title").value = "";
  document.getElementById("g-category").value = "work";
  document.getElementById("g-date").value = "";
  document.getElementById("g-desc").value = "";
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(() => document.getElementById("g-title").focus(), 50);
}

function openGoalEditModal(goalId) {
  const goal = allGoals.find(g => g.goal_id === goalId);
  if (!goal) return;
  editingGoalId = goalId;
  document.getElementById("modal-title").textContent = "✏️ 編輯目標";
  document.getElementById("save-btn").textContent = "儲存修改";
  document.getElementById("g-title").value = goal.title || "";
  document.getElementById("g-category").value = goal.category || "work";
  document.getElementById("g-date").value = goal.target_date || "";
  document.getElementById("g-desc").value = goal.description || "";
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(() => document.getElementById("g-title").focus(), 50);
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}
function closeModalOverlay(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}
document.addEventListener("keydown", e => { if (e.key === "Escape") { closeModal(); closeMsModal(); } });

// ── 儲存目標（新增或編輯）────────────────────────────────────
function saveGoal() {
  const title = document.getElementById("g-title").value.trim();
  if (!title) { toast("請輸入目標名稱", true); return; }
  const btn = document.getElementById("save-btn");
  btn.disabled = true;

  const category    = document.getElementById("g-category").value;
  const target_date = document.getElementById("g-date").value;
  const description = document.getElementById("g-desc").value.trim();

  if (editingGoalId) {
    // 編輯現有目標
    const goal = allGoals.find(g => g.goal_id === editingGoalId);
    if (goal) {
      goal.title       = title;
      goal.category    = category;
      goal.target_date = target_date;
      goal.description = description;
    }
    lsSave(allGoals);
    toast("目標已更新！");
  } else {
    // 新增目標
    const newGoal = {
      goal_id:     genId("g"),
      title,
      category,
      target_date,
      description,
      status:      "active",
      milestones:  []
    };
    allGoals.push(newGoal);
    lsSave(allGoals);
    toast("目標已新增！");
  }

  btn.disabled = false;
  closeModal();
  renderGoals();
}

// ── 刪除目標 ───────────────────────────────────────────────
function confirmDeleteGoal(goalId) {
  const goal = allGoals.find(g => g.goal_id === goalId);
  if (!goal) return;
  showConfirm(`確定要刪除目標「${goal.title}」嗎？\n此操作無法復原。`, () => {
    allGoals = allGoals.filter(g => g.goal_id !== goalId);
    lsSave(allGoals);
    expandedGoals.delete(goalId);
    toast("目標已刪除");
    renderGoals();
  });
}

// ── 新增里程碑 ─────────────────────────────────────────────
function addMs(goalId) {
  const input = document.getElementById("ms-input-" + goalId);
  const title = input.value.trim();
  if (!title) return;
  const goal = allGoals.find(g => g.goal_id === goalId);
  if (!goal) return;
  if (!goal.milestones) goal.milestones = [];
  goal.milestones.push({
    milestone_id: genId("m"),
    goal_id:      goalId,
    title,
    status:       "pending",
    completed_at: null
  });
  lsSave(allGoals);
  input.value = "";
  toast("里程碑已新增！");
  renderGoals();
  // 保持展開狀態
  expandedGoals.add(goalId);
  const el = document.getElementById("goal-" + goalId);
  if (el) el.classList.add("open");
}

// ── 切換里程碑完成狀態 ─────────────────────────────────────
function toggleMs(goalId, msId, checkbox) {
  const goal = allGoals.find(g => g.goal_id === goalId);
  if (!goal) return;
  const ms = (goal.milestones || []).find(m => m.milestone_id === msId);
  if (!ms) return;
  ms.status = checkbox.checked ? "done" : "pending";
  ms.completed_at = checkbox.checked ? new Date().toISOString().slice(0, 10) : null;
  lsSave(allGoals);
  renderGoals();
  // 保持展開狀態
  expandedGoals.add(goalId);
  const el = document.getElementById("goal-" + goalId);
  if (el) el.classList.add("open");
}

// ── 里程碑 編輯 Modal ──────────────────────────────────────
function openMsEditModal(goalId, msId) {
  const goal = allGoals.find(g => g.goal_id === goalId);
  if (!goal) return;
  const ms = (goal.milestones || []).find(m => m.milestone_id === msId);
  if (!ms) return;
  editingMsId     = msId;
  editingMsGoalId = goalId;
  document.getElementById("ms-edit-title").value = ms.title || "";
  document.getElementById("ms-modal-overlay").classList.add("open");
  setTimeout(() => document.getElementById("ms-edit-title").focus(), 50);
}

function closeMsModal() {
  document.getElementById("ms-modal-overlay").classList.remove("open");
}
function closeMsModalOverlay(e) {
  if (e.target === document.getElementById("ms-modal-overlay")) closeMsModal();
}

function saveMilestone() {
  const title = document.getElementById("ms-edit-title").value.trim();
  if (!title) { toast("請輸入里程碑名稱", true); return; }
  const goal = allGoals.find(g => g.goal_id === editingMsGoalId);
  if (!goal) return;
  const ms = (goal.milestones || []).find(m => m.milestone_id === editingMsId);
  if (!ms) return;
  ms.title = title;
  lsSave(allGoals);
  toast("里程碑已更新！");
  closeMsModal();
  renderGoals();
  expandedGoals.add(editingMsGoalId);
  const el = document.getElementById("goal-" + editingMsGoalId);
  if (el) el.classList.add("open");
}

// ── 刪除里程碑 ─────────────────────────────────────────────
function confirmDeleteMs(goalId, msId) {
  const goal = allGoals.find(g => g.goal_id === goalId);
  if (!goal) return;
  const ms = (goal.milestones || []).find(m => m.milestone_id === msId);
  if (!ms) return;
  showConfirm(`確定要刪除里程碑「${ms.title}」嗎？`, () => {
    goal.milestones = goal.milestones.filter(m => m.milestone_id !== msId);
    lsSave(allGoals);
    toast("里程碑已刪除");
    renderGoals();
    expandedGoals.add(goalId);
    const el = document.getElementById("goal-" + goalId);
    if (el) el.classList.add("open");
  });
}

// ── 確認對話框 ─────────────────────────────────────────────
let confirmCallback = null;
function showConfirm(msg, cb) {
  document.getElementById("confirm-msg").textContent = msg;
  confirmCallback = cb;
  document.getElementById("confirm-overlay").classList.add("open");
  document.getElementById("confirm-ok").onclick = () => {
    closeConfirm();
    if (confirmCallback) confirmCallback();
  };
}
function closeConfirm() {
  document.getElementById("confirm-overlay").classList.remove("open");
  confirmCallback = null;
}

// ── helpers ────────────────────────────────────────────────
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
let toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = isErr ? "err show" : "show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = isErr ? "err" : "", 2500);
}
</script>
