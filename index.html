<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }

  /* ── top bar ── */
  header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 20px;
           display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 600; }
  .header-btn { padding: 6px 12px; font-size: 13px; border-radius: 8px; border: 1px solid #e5e5e5;
                background: #fff; cursor: pointer; color: #555; display: flex; align-items: center; gap: 5px; }
  .header-btn:hover { background: #f5f5f5; }

  /* ── layout ── */
  main { max-width: 700px; margin: 0 auto; padding: 16px 16px 80px; }

  /* ── tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab { padding: 7px 16px; border-radius: 8px; font-size: 14px; border: 1px solid #e5e5e5;
         cursor: pointer; background: #fff; }
  .tab.active { background: #222; color: #fff; border-color: #222; }

  /* ── goals list ── */
  .goal-item { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .goal-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .goal-title { font-weight: 600; font-size: 15px; flex: 1; }
  .goal-meta { font-size: 12px; color: #888; margin-bottom: 8px; }

  /* progress bar */
  .progress-wrap { background: #f0f0f0; border-radius: 4px; height: 6px; margin-bottom: 4px; }
  .progress-bar { height: 6px; border-radius: 4px; background: #534ab7; transition: width .3s; }
  .progress-label { font-size: 12px; color: #888; }

  /* ── collapsible goal ── */
  .goal-summary { cursor: pointer; user-select: none; }
  .goal-summary:hover .goal-title { text-decoration: underline; text-decoration-color: #ccc; }
  .goal-chevron { font-size: 11px; color: #bbb; margin-left: 4px; transition: transform .2s; display: inline-block; }
  .goal-item.open .goal-chevron { transform: rotate(90deg); }
  .goal-detail { display: none; margin-top: 12px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
  .goal-item.open .goal-detail { display: block; }

  /* goal action buttons */
  .goal-actions { display: flex; gap: 6px; margin-top: 10px; }
  .btn-icon { padding: 5px 10px; font-size: 12px; border-radius: 6px; border: 1px solid #e5e5e5;
              background: #fff; cursor: pointer; color: #666; }
  .btn-icon:hover { background: #f5f5f5; }
  .btn-icon.danger { color: #a32d2d; border-color: #f5c6c6; }
  .btn-icon.danger:hover { background: #fff0f0; }

  /* milestones */
  .ms-item { display: flex; align-items: center; gap: 8px; padding: 7px 0;
             border-bottom: 1px solid #f8f8f8; font-size: 14px; }
  .ms-item:last-child { border-bottom: none; }
  .ms-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: #534ab7; }
  .ms-title { flex: 1; }
  .ms-title.done { text-decoration: line-through; color: #aaa; }
  .ms-date { font-size: 11px; color: #aaa; }
  .ms-btn { padding: 3px 8px; font-size: 11px; border-radius: 5px; border: 1px solid #e5e5e5;
            background: #fff; cursor: pointer; color: #666; flex-shrink: 0; }
  .ms-btn:hover { background: #f5f5f5; }
  .ms-btn.danger { color: #a32d2d; border-color: #f5c6c6; }
  .ms-btn.danger:hover { background: #fff0f0; }

  /* inline add milestone */
  .ms-add { display: flex; gap: 8px; margin-top: 10px; }
  .ms-add input { flex: 1; padding: 7px 10px; font-size: 13px; }
  .ms-add button { padding: 7px 14px; font-size: 13px; flex-shrink: 0; }

  /* ── button base ── */
  button {
    padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1px solid #ddd; background: #fff; transition: all .15s; }
  button:hover { background: #f5f5f5; }
  button.primary { background: #222; color: #fff; border-color: #222; }
  button.primary:hover { background: #444; }
  button.small { padding: 6px 12px; font-size: 13px; }
  button:disabled { opacity: .45; cursor: not-allowed; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 28px; right: 24px; z-index: 20;
    width: 52px; height: 52px; border-radius: 50%;
    background: #222; color: #fff; border: none;
    font-size: 26px; line-height: 1; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,.25); cursor: pointer;
    transition: background .15s, transform .15s; padding: 0; }
  .fab:hover { background: #444; transform: scale(1.07); }

  /* ── modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s; }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: #fff; border-radius: 14px; padding: 24px;
    width: 100%; max-width: 480px;
    transform: translateY(20px); transition: transform .2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-close {
    background: none; border: none; font-size: 18px; color: #999;
    cursor: pointer; padding: 4px 8px; line-height: 1; }
  .modal-close:hover { color: #333; background: #f0f0f0; border-radius: 6px; }

  /* ── forms ── */
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 13px; color: #555; font-weight: 500; }
  input, select, textarea {
    padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; font-family: inherit; width: 100%;
    transition: border-color .15s; background: #fafafa; }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #666; background: #fff; }
  textarea { resize: vertical; min-height: 70px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  /* ── toast ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
           background: #222; color: #fff; padding: 10px 20px; border-radius: 8px;
           font-size: 14px; transition: transform .25s; z-index: 100; pointer-events: none; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.err   { background: #a32d2d; }

  /* ── confirm dialog ── */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 60; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s; }
  .confirm-overlay.open { opacity: 1; pointer-events: auto; }
  .confirm-box {
    background: #fff; border-radius: 14px; padding: 24px;
    width: 100%; max-width: 360px; text-align: center;
    transform: translateY(20px); transition: transform .2s; }
  .confirm-overlay.open .confirm-box { transform: translateY(0); }
  .confirm-box p { font-size: 15px; margin-bottom: 18px; line-height: 1.5; }
  .confirm-box .btn-row { justify-content: center; }

  /* ── summary bar ── */
  .summary-card {
    background: #fff; border: 1px solid #eee; border-radius: 12px;
    padding: 16px 20px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 20px; }
  .summary-donut { position: relative; flex-shrink: 0; }
  .summary-donut svg { display: block; }
  .donut-track { fill: none; stroke: #f0f0f0; stroke-width: 3.8; }
  .donut-fill  { fill: none; stroke: #534ab7; stroke-width: 3.8;
                 stroke-linecap: round; transition: stroke-dasharray .4s; }
  .donut-pct   { font-size: 7.5px; font-weight: 700; fill: #222; dominant-baseline: middle; text-anchor: middle; }
  .summary-info { flex: 1; min-width: 0; }
  .summary-title { font-size: 13px; color: #888; margin-bottom: 4px; }
  .summary-nums  { font-size: 15px; font-weight: 600; color: #222; margin-bottom: 4px; }
  .summary-week  { font-size: 12px; color: #1d9e75; }

  /* ── AI summary card ── */
  .ai-card {
    background: #fff; border: 1px solid #eee; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 16px; }
  .ai-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; }
  .ai-card-title {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 600; color: #534ab7; }
  .ai-card-date { font-size: 12px; color: #aaa; }
  .ai-card-body { font-size: 14px; line-height: 1.7; color: #444; margin-bottom: 12px; }
  .ai-card-actions { display: flex; gap: 8px; }
  .ai-btn {
    flex: 1; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid #e5e5e5; background: #fff; color: #555;
    transition: background .15s; text-align: center; }
  .ai-btn:hover { background: #f5f5f5; }
  .ai-btn.primary { background: #534ab7; color: #fff; border-color: #534ab7; }
  .ai-btn.primary:hover { background: #6358cc; }
  .ai-card-placeholder {
    font-size: 13px; color: #aaa; text-align: center; padding: 8px 0; margin-bottom: 12px; }

  /* ── 問 AI modal ── */
  .ai-chat-history {
    max-height: 260px; overflow-y: auto; margin-bottom: 12px;
    display: flex; flex-direction: column; gap: 10px; }
  .ai-msg { padding: 10px 13px; border-radius: 10px; font-size: 14px; line-height: 1.6; max-width: 90%; }
  .ai-msg.user { background: #534ab7; color: #fff; align-self: flex-end; }
  .ai-msg.bot  { background: #f5f5f5; color: #333; align-self: flex-start; }
  .ai-input-row { display: flex; gap: 8px; }
  .ai-input-row input { flex: 1; }

  /* ── empty state ── */
  .empty { text-align: center; color: #bbb; padding: 32px 0; font-size: 14px; }

  /* ── loading spinner ── */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd;
             border-top-color: #666; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 類別管理 ── */
  .cat-modal { max-width: 520px; }
  .cat-list { max-height: 260px; overflow-y: auto; margin-bottom: 4px; }
  .cat-item { display: flex; align-items: center; gap: 10px; padding: 8px 0;
              border-bottom: 1px solid #f5f5f5; }
  .cat-item:last-child { border-bottom: none; }
  .cat-form-section { border-top: 1px solid #eee; margin-top: 12px; padding-top: 14px; }
  .cat-form-title { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 12px; }
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-dot {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform .15s, border-color .15s; }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.selected { border-color: #222; box-shadow: 0 0 0 2px #fff inset; }
</style>
</head>
<body>

<header>
  <h1>🎯 Goal Tracker</h1>
  <button class="header-btn" onclick="openCatModal()">🗂️ 管理類別</button>
</header>

<main>
  <div id="summary-bar"></div>
  <div id="ai-summary-section"></div>
  <div class="tabs" id="tabs-container">
    <div class="empty" style="padding:4px 0;">載入中… <span class="spinner"></span></div>
  </div>
  <div id="goals-list"><div class="empty">載入中… <span class="spinner"></span></div></div>
</main>

<button class="fab" onclick="openGoalModal()" title="新增目標">＋</button>

<!-- 新增 / 編輯目標 Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">➕ 新增目標</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-row">
      <label>目標名稱 *</label>
      <input id="g-title" type="text" placeholder="例：完成 Q3 產品上線">
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label>類別</label>
        <select id="g-category"></select>
      </div>
      <div class="form-row" style="margin:0">
        <label>截止日</label>
        <input id="g-date" type="date">
      </div>
    </div>
    <div class="form-row">
      <label>說明（選填）</label>
      <textarea id="g-desc" placeholder="目標背景或細節…"></textarea>
    </div>
    <div class="btn-row">
      <button class="primary" id="save-btn" onclick="saveGoal()">新增目標</button>
      <button onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<!-- 編輯里程碑 Modal -->
<div class="modal-overlay" id="ms-modal-overlay" onclick="closeMsModalOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>✏️ 編輯里程碑</h2>
      <button class="modal-close" onclick="closeMsModal()">✕</button>
    </div>
    <div class="form-row">
      <label>里程碑名稱 *</label>
      <input id="ms-edit-title" type="text" placeholder="里程碑名稱">
    </div>
    <div class="btn-row">
      <button class="primary" id="ms-save-btn" onclick="saveMilestone()">儲存</button>
      <button onclick="closeMsModal()">取消</button>
    </div>
  </div>
</div>

<!-- 類別管理 Modal -->
<div class="modal-overlay" id="cat-modal-overlay" onclick="closeCatModalOverlay(event)">
  <div class="modal cat-modal">
    <div class="modal-header">
      <h2>🗂️ 管理類別</h2>
      <button class="modal-close" onclick="closeCatModal()">✕</button>
    </div>
    <div class="cat-list" id="cat-list"></div>
    <div class="cat-form-section">
      <div class="cat-form-title" id="cat-form-title">新增類別</div>
      <div class="form-row-2" style="margin-bottom:10px">
        <div class="form-row" style="margin:0">
          <label>名稱 *</label>
          <input id="cat-name" type="text" placeholder="例：健康">
        </div>
        <div class="form-row" style="margin:0">
          <label>圖示（Emoji）</label>
          <input id="cat-icon" type="text" placeholder="例：💪" maxlength="4">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:12px">
        <label>顏色</label>
        <div class="color-picker" id="cat-color-picker"></div>
      </div>
      <div class="btn-row">
        <button class="primary small" id="cat-save-btn" onclick="saveCat()">新增</button>
        <button class="small" id="cat-cancel-edit" onclick="resetCatForm()" style="display:none">取消編輯</button>
      </div>
    </div>
  </div>
</div>

<!-- 問 AI Modal -->
<div class="modal-overlay" id="ai-modal-overlay" onclick="closeAiModalOverlay(event)">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h2>💬 問 AI</h2>
      <button class="modal-close" onclick="closeAiModal()">✕</button>
    </div>
    <div class="ai-chat-history" id="ai-chat-history"></div>
    <div class="ai-input-row">
      <input id="ai-question-input" type="text" placeholder="問我關於你的目標任何問題…"
             onkeydown="if(event.key==='Enter')sendAiQuestion()">
      <button class="primary small" onclick="sendAiQuestion()">送出</button>
    </div>
  </div>
</div>

<!-- 確認刪除對話框 -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-msg">確定要刪除嗎？</p>
    <div class="btn-row">
      <button class="primary" style="background:#a32d2d;border-color:#a32d2d" id="confirm-ok">確認刪除</button>
      <button onclick="closeConfirm()">取消</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 設定 ──────────────────────────────────────────────────
const API_URL      = "https://script.google.com/macros/s/AKfycbwq9Q7f4XFF0LmsdTgx65eM4V32jAic4ReAIn-CVBmwMEUW4gRXDi1jB1uXovQ-2AgYZA/exec";
const API_TOKEN    = "goaltracker2026";
const GEMINI_KEY   = "AIzaSyChdlNcZDjk6XXJ2xmwWnmbpEObOLn9m44";  // ← 貼上你的 Gemini API Key
const GEMINI_URL   = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + GEMINI_KEY;

// ── 顏色主題 ──────────────────────────────────────────────
const COLOR_THEMES = {
  purple: { bg: "#eeedfe", text: "#534ab7", bar: "#534ab7" },
  green:  { bg: "#e1f5ee", text: "#0f6e56", bar: "#1d9e75" },
  blue:   { bg: "#dbeafe", text: "#1d4ed8", bar: "#3b82f6" },
  orange: { bg: "#fff7ed", text: "#c2410c", bar: "#f97316" },
  pink:   { bg: "#fce7f3", text: "#be185d", bar: "#ec4899" },
  teal:   { bg: "#ccfbf1", text: "#0f766e", bar: "#14b8a6" },
};

// ── state ──────────────────────────────────────────────────
let allGoals        = [];
let allCategories   = [];
let activeTab       = "all";
let editingGoalId   = null;
let editingMsId     = null;
let editingMsGoalId = null;
let editingCatId    = null;
let editingCatColor = "purple";
const expandedGoals = new Set();

// ── init ───────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", loadAll);

// ── API call ───────────────────────────────────────────────
async function api(params) {
  const url = new URL(API_URL);
  url.searchParams.set("token", API_TOKEN);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) url.searchParams.set(k, v);
  });
  const res  = await fetch(url.toString());
  const data = await res.json();
  if (!data.success) throw new Error(data.error || "API 錯誤");
  return data;
}

// ── load all ───────────────────────────────────────────────
async function loadAll() {
  try {
    const [goalsData, catsData] = await Promise.all([
      api({ action: "getGoals" }),
      api({ action: "getCategories" })
    ]);
    allGoals      = goalsData.data;
    allCategories = catsData.data;
    renderTabs();
    renderGoals();
    renderAiSummaryCard(aiSummaryCache);
  } catch (e) {
    toast("連線失敗：" + e.message, true);
    document.getElementById("goals-list").innerHTML = `<div class="empty">❌ ${esc(e.message)}</div>`;
    document.getElementById("tabs-container").innerHTML = '<button class="tab active" onclick="setTab(\'all\', this)">全部</button>';
  }
}

// ── 載入目標（重新整理用）─────────────────────────────────
async function loadGoals() {
  try {
    const data = await api({ action: "getGoals" });
    allGoals = data.data;
    renderGoals();
  } catch (e) {
    toast("連線失敗：" + e.message, true);
  }
}

// ── 取得類別資訊 ───────────────────────────────────────────
function getCatInfo(categoryId) {
  const cat = allCategories.find(c => c.category_id === categoryId);
  return cat || { category_id: categoryId, name: categoryId, icon: "📌", color: "purple" };
}

// ── tabs & expand ──────────────────────────────────────────
function renderTabs() {
  const container = document.getElementById("tabs-container");
  const tabs = [
    `<button class="tab${activeTab === "all" ? " active" : ""}" onclick="setTab('all', this)">全部</button>`
  ];
  allCategories.forEach(c => {
    const isActive = activeTab === c.category_id;
    tabs.push(`<button class="tab${isActive ? " active" : ""}" onclick="setTab('${esc(c.category_id)}', this)">${esc(c.icon)} ${esc(c.name)}</button>`);
  });
  container.innerHTML = tabs.join("");
}

function setTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  renderGoals();
}

function toggleGoal(goalId) {
  const el = document.getElementById("goal-" + goalId);
  if (!el) return;
  if (expandedGoals.has(goalId)) {
    expandedGoals.delete(goalId);
    el.classList.remove("open");
  } else {
    expandedGoals.add(goalId);
    el.classList.add("open");
  }
}

// ── summary bar ────────────────────────────────────────────
function renderSummary() {
  const active      = allGoals.filter(g => g.status !== "done" && g.status !== "archived");
  const allMs       = active.flatMap(g => g.milestones || []);
  const totalMs     = allMs.length;
  const doneMs      = allMs.filter(m => m.status === "done").length;
  const pct         = totalMs ? Math.round(doneMs / totalMs * 100) : 0;

  // milestones completed this week (Mon–today)
  const today    = new Date();
  const dayOfWk  = (today.getDay() + 6) % 7; // Mon=0 … Sun=6
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - dayOfWk);
  weekStart.setHours(0, 0, 0, 0);
  const weekDone = allMs.filter(m => {
    if (m.status !== "done" || !m.completed_at) return false;
    const d = new Date(m.completed_at);
    return d >= weekStart && d <= today;
  }).length;

  // SVG donut: circumference ≈ 2π×15.9 ≈ 99.9 → use 100 as full
  const dash = pct.toFixed(1);
  const el   = document.getElementById("summary-bar");
  if (!el) return;
  el.innerHTML = `
    <div class="summary-card">
      <div class="summary-donut">
        <svg viewBox="0 0 36 36" width="80" height="80">
          <circle class="donut-track" cx="18" cy="18" r="15.9"/>
          <circle class="donut-fill" cx="18" cy="18" r="15.9"
            stroke-dasharray="${dash}, 100"
            transform="rotate(-90 18 18)"/>
          <text class="donut-pct" x="18" y="18">${pct}%</text>
        </svg>
      </div>
      <div class="summary-info">
        <div class="summary-title">整體完成度</div>
        <div class="summary-nums">${active.length} 個目標・${totalMs} 個里程碑</div>
        ${weekDone > 0
          ? `<div class="summary-week">本週完成 ${weekDone} 項 ✓</div>`
          : `<div class="summary-week" style="color:#bbb">本週尚無完成項目</div>`}
      </div>
    </div>`;
}

// ── render ─────────────────────────────────────────────────
function renderGoals() {
  renderSummary();
  const list = document.getElementById("goals-list");
  let goals  = allGoals.filter(g => g.status !== "done" && g.status !== "archived");
  if (activeTab !== "all") goals = goals.filter(g => g.category === activeTab);
  if (!goals.length) { list.innerHTML = '<div class="empty">目前沒有進行中的目標</div>'; return; }

  list.innerHTML = goals.map(g => {
    const total  = (g.milestones || []).length;
    const done   = (g.milestones || []).filter(m => m.status === "done").length;
    const pct    = total ? Math.round(done / total * 100) : 0;
    const cat    = getCatInfo(g.category);
    const theme  = COLOR_THEMES[cat.color] || COLOR_THEMES.purple;
    const isOpen = expandedGoals.has(g.goal_id);

    const msHtml = (g.milestones || []).map(m => `
      <div class="ms-item">
        <input type="checkbox" ${m.status==="done"?"checked":""} onchange="toggleMs('${m.milestone_id}', this)">
        <span class="ms-title ${m.status==="done"?"done":""}">${esc(m.title)}</span>
        ${m.completed_at ? `<span class="ms-date">${String(m.completed_at).slice(5,10)}</span>` : ""}
        <button class="ms-btn" onclick="openMsEditModal('${g.goal_id}','${m.milestone_id}')">編輯</button>
        <button class="ms-btn danger" onclick="confirmDeleteMs('${g.goal_id}','${m.milestone_id}')">刪除</button>
      </div>`).join("");

    return `
    <div class="goal-item${isOpen?" open":""}" id="goal-${g.goal_id}">
      <div class="goal-summary" onclick="toggleGoal('${g.goal_id}')">
        <div class="goal-header">
          <span class="badge" style="background:${theme.bg};color:${theme.text}">${esc(cat.icon)} ${esc(cat.name)}</span>
          <span class="goal-title">${esc(g.title)}</span>
          <span class="goal-chevron">▶</span>
        </div>
        <div class="goal-meta">${g.target_date ? "截止 " + g.target_date : "無截止日"} · ${done}/${total} 里程碑</div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${theme.bar}"></div></div>
        <div class="progress-label">${pct}%</div>
      </div>
      <div class="goal-detail">
        ${msHtml}
        <div class="ms-add">
          <input type="text" placeholder="新增里程碑…" id="ms-input-${g.goal_id}"
                 onkeydown="if(event.key==='Enter')addMs('${g.goal_id}')">
          <button class="small primary" onclick="addMs('${g.goal_id}')">+新增</button>
        </div>
        <div class="goal-actions">
          <button class="btn-icon" onclick="openGoalEditModal('${g.goal_id}')">✏️ 編輯目標</button>
          <button class="btn-icon danger" onclick="confirmDeleteGoal('${g.goal_id}')">🗑️ 刪除目標</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

async function saveGoal() {
  const title = document.getElementById("g-title").value.trim();
  if (!title) { toast("請輸入目標名稱", true); return; }
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = "儲存中…";

  const params = {
    title,
    category:    document.getElementById("g-category").value,
    target_date: document.getElementById("g-date").value,
    description: document.getElementById("g-desc").value.trim()
  };

  try {
    if (editingGoalId) {
      await api({ action: "updateGoal", goal_id: editingGoalId, ...params });
      toast("目標已更新！");
    } else {
      await api({ action: "createGoal", ...params });
      toast("目標已新增！");
    }
    closeModal();
    await loadGoals();
  } catch (e) {
    toast(e.message, true);
  } finally {

    btn.textContent = origText;
  }

async function addMs(goalId) {
  const input = document.getElementById("ms-input-" + goalId);
  const title = input.value.trim();
  if (!title) return;
  input.disabled = true;
  try {
    await api({ action: "createMilestone", goal_id: goalId, title });
    input.value = "";
    toast("里程碑已新增！");
    await loadGoals();
    expandedGoals.add(goalId);
    const el = document.getElementById("goal-" + goalId);
    if (el) el.classList.add("open");
  } catch (e) {
    toast(e.message, true);
  } finally {
    input.disabled = false;
    input.focus();
  }
}

// ── 切換里程碑完成狀態 ─────────────────────────────────────
async function toggleMs(msId, checkbox) {
  checkbox.disabled = true;
  try {
    await api({ action: "toggleMilestone", milestone_id: msId });
    await loadGoals();
    expandedGoals.forEach(id => {
      const el = document.getElementById("goal-" + id);
      if (el) el.classList.add("open");
    });
  } catch (e) {
    toast(e.message, true);
    checkbox.checked = !checkbox.checked;
  } finally {
    checkbox.disabled = false;
  }
}

async function callGemini(prompt) {
  const res = await fetch(GEMINI_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 512 }
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates[0].content.parts[0].text;
}

function buildSummaryPrompt() {
  const today    = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  const dayOfWk  = (today.getDay() + 6) % 7;
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - dayOfWk);
  weekStart.setHours(0, 0, 0, 0);

  const active = allGoals.filter(g => g.status !== "done" && g.status !== "archived");
  const desc = active.map(g => {
    const total    = (g.milestones || []).length;
    const done     = (g.milestones || []).filter(m => m.status === "done").length;
    const pct      = total ? Math.round(done / total * 100) : 0;
    const weekDone = (g.milestones || []).filter(m => {
      if (m.status !== "done" || !m.completed_at) return false;
      return new Date(m.completed_at) >= weekStart;
    }).length;
    const daysLeft = g.target_date
      ? Math.ceil((new Date(g.target_date) - today) / 86400000)
      : null;
    return `- 目標：${g.title}（進度：${pct}%，${done}/${total} 里程碑完成` +
           (weekDone > 0 ? `，本週完成 ${weekDone} 項` : "") +
           (daysLeft !== null ? `，距截止 ${daysLeft} 天` : "") + ")";
  }).join("\n");

  return `今天是 ${todayStr}，以下是我的目標追蹤狀況：\n\n${desc}\n\n` +
    `請用繁體中文，以一段連貫的話（約 80～120 字）幫我總結本週狀況，內容需涵蓋：\n` +
    `1. 亮點（有什麼值得肯定的進展）\n` +
    `2. 注意事項（哪些目標進度落後或即將到期需要注意）\n` +
    `3. 下週建議（最優先應衝刺哪些目標）\n\n` +
    `語氣輕鬆直接，不要分點列舉，整合成自然流暢的一段話即可。`;
}

async function generateAiSummary() {
  if (GEMINI_KEY === "YOUR_GEMINI_API_KEY") {
    toast("請先在 index.html 設定 GEMINI_KEY", true); return;
  }
  renderAiSummaryCard("loading");
  try {
    const summary = await callGemini(buildSummaryPrompt());
    const today   = new Date();
    const dateStr = `${today.getMonth()+1}/${today.getDate()}`;
    aiSummaryCache = { summary, generated_at: dateStr };
    renderAiSummaryCard(aiSummaryCache);
  } catch (e) {
    toast("AI 摘要失敗：" + e.message, true);
    renderAiSummaryCard("error");
  }
}

  try {

    const desc = active.map(g => {
      const total = (g.milestones || []).length;
      const done  = (g.milestones || []).filter(m => m.status === "done").length;
      const pct   = total ? Math.round(done / total * 100) : 0;
      return `- ${g.title}（${pct}%，截止：${g.target_date || "未設定"}）`;
    }).join("\n");
    const prompt = `以下是使用者的目標追蹤資料：\n${desc || "（目前沒有進行中的目標）"}\n\n使用者問題：${question}\n\n請用繁體中文，簡潔地回答（100字以內），聚焦在目標管理相關的實用建議。`;
    const answer = await callGemini(prompt);
    loadingDiv.remove();
    appendAiMsg(answer, "bot");
  } catch (e) {
    loadingDiv.remove();
    appendAiMsg("發生錯誤：" + e.message, "bot");
  }
}

// ── helpers ────────────────────────────────────────────────
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
let toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = isErr ? "err show" : "show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = isErr ? "err" : "", isErr ? 5000 : 2500);
}
</script>
